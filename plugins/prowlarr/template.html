<div class="result-item">
  <div class="result-item-inner">
    <div class="result-body">
      <div class="result-url-row">
        <img class="result-favicon" src="{{faviconSrc}}" alt="" />
        <cite class="result-cite">{{cite}}</cite>
      </div>
      <div class="result-title prowlarr-title-row">
        <span class="prowlarr-title-text">{{title}}</span>
        <a class="prowlarr-primary-link" href="{{itemUrl}}">{{itemLabel}}</a>
        {{trackerLink}}
      </div>
      <p class="result-snippet">{{snippet}}</p>
      <div class="result-engines">{{badges}}</div>
    </div>
    {{thumbBlock}}
  </div>
</div>
