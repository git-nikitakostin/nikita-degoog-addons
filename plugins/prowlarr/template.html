<div class="result-item">
  <div class="result-item-inner">
    <div class="result-body">
      <div class="result-url-row">
        <img class="result-favicon" src="{{faviconSrc}}" alt="" />
        <cite class="result-cite">{{cite}}</cite>
      </div>
      <a class="result-title" href="{{titleUrl}}">{{title}}</a>
      {{actionButtons}}
      <p class="result-snippet">{{snippet}}</p>
      <div class="result-engines">{{badges}}</div>
    </div>
    {{thumbBlock}}
  </div>
</div>
